<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM RACING</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2a;--text:#e0ddd5;--dim:#555;--red:#e8293a;--orange:#f07020;--yellow:#f0c020;--blue:#2090f0;--green:#20c060;--cyan:#20d0d0;--purple:#9040e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
canvas{display:block}
.screen{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg)}.screen.active{display:flex}
.logo{font-family:'Orbitron',sans-serif;font-size:3.5rem;font-weight:900;letter-spacing:8px;margin-bottom:2px}
.logo .zm{color:var(--red)}.logo .r{color:var(--text)}
.logo-sub{color:var(--dim);font-size:.7rem;letter-spacing:6px;font-family:'Orbitron',sans-serif;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);padding:24px;max-width:440px;width:100%;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow))}
.card h2{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--yellow);margin-bottom:16px;letter-spacing:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:'Orbitron',sans-serif}
.field input,.field select{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none}
.field input:focus{border-color:var(--red)}
.btn{display:block;width:100%;padding:13px;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:3px;border:none;cursor:pointer;transition:all .15s;text-transform:uppercase}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.2)}
.btn-dark{background:var(--border);color:var(--text);margin-top:8px}.btn-dark:hover{background:#2a2a3a}
.divider{text-align:center;color:var(--dim);margin:14px 0;font-size:.7rem;letter-spacing:4px;font-family:'Orbitron',sans-serif}
.room-code{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--yellow);letter-spacing:10px;text-align:center;margin:10px 0;padding:10px;background:var(--bg);border:2px dashed var(--yellow)}
.plist{list-style:none;margin:10px 0}.plist li{padding:7px 10px;background:var(--bg);border:1px solid var(--border);margin-bottom:3px;font-size:.8rem;display:flex;align-items:center;gap:8px}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.info{text-align:center;color:var(--dim);font-size:.65rem;margin-top:10px;letter-spacing:2px;font-family:'Orbitron',sans-serif}
/* Car select */
.car-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.car-opt{background:var(--bg);border:2px solid var(--border);padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.car-opt:hover{border-color:var(--dim)}.car-opt.sel{border-color:var(--yellow);box-shadow:0 0 20px rgba(240,192,32,.1)}
.car-opt .car-icon{font-size:2rem;margin-bottom:4px}
.car-opt .car-name{font-family:'Orbitron',sans-serif;font-size:.55rem;color:var(--yellow);letter-spacing:1px}
.car-opt .car-stat{font-size:.6rem;color:var(--dim);margin-top:2px}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;justify-content:space-between;padding:8px 14px;pointer-events:none}
.hud-l,.hud-r{pointer-events:auto;background:rgba(10,10,15,.85);border:1px solid var(--border);padding:6px 12px;font-size:.75rem;backdrop-filter:blur(4px)}
.hud-val{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--yellow)}
.hud-dim{color:var(--dim);font-size:.6rem;letter-spacing:1px;font-family:'Orbitron',sans-serif}
.nitro-bar{width:100px;height:6px;background:var(--border);margin-top:3px;display:inline-block;vertical-align:middle}
.nitro-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .1s}
/* Finish overlay */
#finish{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(5,5,10,.9)}
.fin-box{text-align:center}
.fin-box h1{font-family:'Orbitron',sans-serif;font-size:2.5rem;color:var(--yellow);letter-spacing:6px;margin-bottom:8px}
.fin-box p{color:var(--dim);font-size:.85rem;margin-bottom:20px}
.fin-list{list-style:none;margin:16px auto;max-width:300px}
.fin-list li{padding:8px 12px;background:var(--surface);border:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;font-size:.8rem}
.fin-pos{font-family:'Orbitron',sans-serif;color:var(--yellow);font-weight:700}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="menu" class="screen active">
  <div class="logo"><span class="zm">ZM</span> <span class="r">RACING</span></div>
  <div class="logo-sub">Feel The Speed</div>
  <div class="card fade-in">
    <h2>Enter The Race</h2>
    <div class="field"><label>Driver Name</label><input id="my-name" maxlength="12" placeholder="Your name..."></div>
    <button class="btn btn-red" onclick="createRoom()">Create Room</button>
    <div class="divider">— or join —</div>
    <div class="field"><label>Room Code</label><input id="join-code" maxlength="5" placeholder="ABCDE" style="text-transform:uppercase;text-align:center;font-family:'Orbitron',sans-serif;font-size:1.1rem;letter-spacing:6px"></div>
    <button class="btn btn-dark" onclick="joinRoom()">Join Room</button>
  </div>
</div>

<div id="lobby" class="screen">
  <div class="card fade-in" style="text-align:center">
    <h2>Race Lobby</h2>
    <div style="color:var(--dim);font-size:.6rem;letter-spacing:2px;font-family:'Orbitron',sans-serif">ROOM CODE</div>
    <div class="room-code" id="lb-code">-----</div>
    <ul class="plist" id="lb-players"></ul>
    <button class="btn btn-red" id="lb-start" onclick="hostStart()" style="display:none">Start Race</button>
    <div class="info" id="lb-status">Waiting for drivers...</div>
  </div>
</div>

<div id="car-select" class="screen">
  <div class="card fade-in" style="max-width:500px">
    <h2>Choose Your Machine</h2>
    <div class="car-grid" id="car-grid"></div>
    <button class="btn btn-red" onclick="confirmCar()">Lock In</button>
    <div class="info" id="cs-status"></div>
  </div>
</div>

<canvas id="gc"></canvas>
<div id="hud">
  <div class="hud-l">
    <span class="hud-dim">SPD </span><span class="hud-val" id="h-speed">0</span>
    <span class="hud-dim"> km/h</span>&nbsp;&nbsp;
    <span class="hud-dim">POS </span><span class="hud-val" id="h-pos">-</span>&nbsp;&nbsp;
    <span class="hud-dim">LAP </span><span class="hud-val" id="h-lap">1/3</span>
  </div>
  <div class="hud-r">
    <span class="hud-dim">NITRO </span>
    <div class="nitro-bar"><div class="nitro-fill" id="h-nitro" style="width:100%"></div></div>
    <span class="hud-dim"> [N]</span>&nbsp;&nbsp;
    <span class="hud-dim">VIEW [P]</span>
  </div>
</div>

<div id="finish"><div class="fin-box"><h1 id="fin-title">RACE COMPLETE</h1><p id="fin-sub"></p><ul class="fin-list" id="fin-list"></ul><button class="btn btn-red" style="max-width:250px;margin:0 auto" onclick="backToMenu()">Back To Lobby</button></div></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database(),RT='zm_racing';

const CARS=[
  {id:'zm_bolt',name:'ZM Bolt',color:'#e8293a',topSpeed:320,accel:1.8,handling:0.85,icon:'🏎️'},
  {id:'zm_phantom',name:'ZM Phantom',color:'#2090f0',topSpeed:340,accel:1.5,handling:0.9,icon:'🚙'},
  {id:'zm_viper',name:'ZM Viper',color:'#20c060',topSpeed:360,accel:1.3,handling:0.75,icon:'🏁'},
  {id:'zm_fury',name:'ZM Fury',color:'#f07020',topSpeed:300,accel:2.2,handling:0.8,icon:'🔥'},
  {id:'zm_spectre',name:'ZM Spectre',color:'#9040e0',topSpeed:350,accel:1.4,handling:0.95,icon:'👻'},
  {id:'zm_thunder',name:'ZM Thunder',color:'#f0c020',topSpeed:380,accel:1.1,handling:0.7,icon:'⚡'},
];

const ROAD_W=600,LANE_W=100,LANES=4,TRACK_LEN=30000,LAPS=3;
let canvas,ctx,W,H;
let myId=null,myName='',roomId=null,roomRef=null,isHost=false;
let myCar=null,myCarIdx=0,perspective='top'; // 'top' or 'behind'
let gameOn=false,raceFinished=false,finishOrder=[];
let players={},localPlayer=null;
let keys={},lastSync=0,lastT=0;
let roadObjs=[]; // scenery

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<5;i++)r+=c[~~(Math.random()*c.length)];return r}
function genId(){return'r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ═══ CREATE ═══
async function createRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  myId=genId();roomId=genCode();roomRef=db.ref(RT+'/'+roomId);isHost=true;
  await roomRef.set({code:roomId,host:myId,status:'lobby',players:{[myId]:{name:myName,ready:false,car:null}}});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}

// ═══ JOIN ═══
async function joinRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){alert('Enter a room code');return;}
  roomRef=db.ref(RT+'/'+code);
  const snap=await roomRef.once('value');
  if(!snap.exists()){alert('Room not found');return;}
  const d=snap.val();
  if(d.status!=='lobby'&&d.status!=='carselect'){alert('Race already started');return;}
  myId=genId();roomId=code;isHost=false;
  await roomRef.child('players/'+myId).set({name:myName,ready:false,car:null});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}

// ═══ LOBBY ═══
function setupLobby(){
  roomRef.child('players').on('value',snap=>{
    const pl=snap.val()||{};
    const list=document.getElementById('lb-players');list.innerHTML='';
    const colors=['#e8293a','#2090f0','#20c060','#f07020','#9040e0','#f0c020','#20d0d0','#e0e0e0'];
    let i=0;
    Object.entries(pl).forEach(([id,p])=>{
      const li=document.createElement('li');
      li.innerHTML=`<span class="pdot" style="background:${colors[i%8]}"></span>${p.name}${id===myId?' (You)':''}`;
      list.appendChild(li);i++;
    });
    const n=Object.keys(pl).length;
    document.getElementById('lb-start').style.display=(isHost&&n>=1)?'block':'none';
    document.getElementById('lb-status').textContent=n+' driver'+(n>1?'s':'')+' in lobby';
  });
  roomRef.child('status').on('value',snap=>{
    if(snap.val()==='carselect') showCarSelect();
    if(snap.val()==='racing') startRace();
  });
}

function hostStart(){roomRef.child('status').set('carselect');}

// ═══ CAR SELECT ═══
function showCarSelect(){
  showScreen('car-select');
  const grid=document.getElementById('car-grid');grid.innerHTML='';
  CARS.forEach((car,i)=>{
    const d=document.createElement('div');
    d.className='car-opt'+(i===0?' sel':'');
    d.innerHTML=`<div class="car-icon">${car.icon}</div><div class="car-name">${car.name}</div>
      <div class="car-stat">SPD ${car.topSpeed} · ACC ${car.accel} · HND ${(car.handling*100).toFixed(0)}%</div>`;
    d.onclick=()=>{grid.querySelectorAll('.car-opt').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');myCarIdx=i;};
    grid.appendChild(d);
  });
  if(i===0) myCarIdx=0;
  // Listen for race start
  roomRef.child('status').on('value',snap=>{if(snap.val()==='racing')startRace();});
}

async function confirmCar(){
  myCar=CARS[myCarIdx];
  await roomRef.child('players/'+myId).update({car:myCarIdx,ready:true});
  document.getElementById('cs-status').textContent='Waiting for others...';
  // If host, check all ready
  if(isHost){
    roomRef.child('players').on('value',async snap=>{
      const pl=snap.val()||{};
      if(Object.values(pl).every(p=>p.ready&&p.car!==null)){
        await roomRef.child('status').set('racing');
      }
    });
  }
}

// ═══ RACE ═══
function startRace(){
  myCar=CARS[myCarIdx]||CARS[0];
  showScreen('menu');// hide all screens
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('hud').style.display='flex';
  document.getElementById('finish').style.display='none';
  
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;
  window.onresize=()=>{W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;};
  
  // Init local player
  localPlayer={
    x:ROAD_W/2,y:0,speed:0,lane:1,
    nitro:100,nitroOn:false,nitroCooldown:0,
    lap:1,checkpoints:0,finished:false,finishTime:0
  };
  gameOn=true;raceFinished=false;finishOrder=[];
  perspective='top';
  
  // Generate road scenery
  roadObjs=[];
  for(let i=0;i<200;i++){
    const side=Math.random()>.5?1:-1;
    roadObjs.push({
      y:Math.random()*TRACK_LEN*LAPS,
      x:side*(ROAD_W/2+40+Math.random()*100),
      type:Math.random()>.5?'tree':'sign',
      color:['#1a4a1a','#1a3a2a','#2a5a2a'][~~(Math.random()*3)]
    });
  }
  
  // Sync
  roomRef.child('race').on('value',snap=>{
    const rd=snap.val()||{};
    players=rd;
  });
  
  lastT=performance.now();
  requestAnimationFrame(gameLoop);
  setInterval(syncPosition,60);
}

function syncPosition(){
  if(!gameOn||!localPlayer)return;
  roomRef.child('race/'+myId).set({
    x:~~localPlayer.x,y:~~localPlayer.y,speed:~~localPlayer.speed,
    car:myCarIdx,name:myName,lap:localPlayer.lap,
    finished:localPlayer.finished,finishTime:localPlayer.finishTime||0,
    t:Date.now()
  });
}

// ═══ GAME LOOP ═══
function gameLoop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  if(!gameOn){requestAnimationFrame(gameLoop);return;}
  update(dt);
  draw();
  updateHUD();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  if(!localPlayer||localPlayer.finished)return;
  const car=myCar||CARS[0];
  const maxSpd=car.topSpeed*(localPlayer.nitroOn?1.4:1);
  const accel=car.accel*150;
  const handling=car.handling;
  
  // Acceleration
  if(keys['w']||keys['arrowup']){
    localPlayer.speed=Math.min(maxSpd,localPlayer.speed+accel*dt);
  } else if(keys['s']||keys['arrowdown']){
    localPlayer.speed=Math.max(-50,localPlayer.speed-accel*2*dt);
  } else {
    // Friction
    localPlayer.speed*=0.98;
    if(Math.abs(localPlayer.speed)<1)localPlayer.speed=0;
  }
  
  // Steering
  const steerSpd=300*handling;
  if(keys['a']||keys['arrowleft']){
    localPlayer.x-=steerSpd*dt*(localPlayer.speed/200);
  }
  if(keys['d']||keys['arrowright']){
    localPlayer.x+=steerSpd*dt*(localPlayer.speed/200);
  }
  
  // Clamp to road
  const halfRoad=ROAD_W/2-20;
  localPlayer.x=Math.max(-halfRoad,Math.min(halfRoad,localPlayer.x));
  
  // Move forward
  localPlayer.y+=localPlayer.speed*dt*2;
  
  // Nitro
  if(keys['n']&&localPlayer.nitro>0&&!localPlayer.nitroCooldown){
    localPlayer.nitroOn=true;
    localPlayer.nitro-=40*dt;
    if(localPlayer.nitro<=0){localPlayer.nitro=0;localPlayer.nitroOn=false;localPlayer.nitroCooldown=3;}
  } else {
    localPlayer.nitroOn=false;
    if(localPlayer.nitroCooldown>0){localPlayer.nitroCooldown-=dt;if(localPlayer.nitroCooldown<0)localPlayer.nitroCooldown=0;}
    if(!keys['n']&&localPlayer.nitroCooldown<=0)localPlayer.nitro=Math.min(100,localPlayer.nitro+8*dt);
  }
  
  // Laps
  const totalDist=TRACK_LEN*LAPS;
  if(localPlayer.y>=totalDist&&!localPlayer.finished){
    localPlayer.finished=true;
    localPlayer.finishTime=Date.now();
    syncPosition();
    checkFinish();
  }
  const currentLap=Math.min(LAPS,Math.floor(localPlayer.y/TRACK_LEN)+1);
  localPlayer.lap=currentLap;
}

function checkFinish(){
  // Show finish after a short delay
  setTimeout(async()=>{
    const snap=await roomRef.child('race').once('value');
    const rd=snap.val()||{};
    const results=Object.entries(rd)
      .filter(([id,p])=>p.finished)
      .sort((a,b)=>a[1].finishTime-b[1].finishTime);
    const allPlayers=Object.entries(rd);
    
    document.getElementById('fin-title').textContent='RACE COMPLETE';
    document.getElementById('fin-sub').textContent='';
    const list=document.getElementById('fin-list');list.innerHTML='';
    results.forEach(([id,p],i)=>{
      const li=document.createElement('li');
      li.innerHTML=`<span class="fin-pos">#${i+1}</span><span>${p.name||'Driver'} ${CARS[p.car||0].icon}</span>`;
      if(id===myId)li.style.borderColor='var(--yellow)';
      list.appendChild(li);
    });
    // Add unfinished
    allPlayers.filter(([id,p])=>!p.finished).forEach(([id,p])=>{
      const li=document.createElement('li');
      li.innerHTML=`<span class="fin-pos">DNF</span><span style="color:var(--dim)">${p.name||'Driver'}</span>`;
      list.appendChild(li);
    });
    
    document.getElementById('finish').style.display='flex';
  },1500);
}

// ═══ DRAW ═══
function draw(){
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  if(!localPlayer)return;
  
  const camY=localPlayer.y;
  const camX=perspective==='behind'?localPlayer.x*0.3:0;
  
  ctx.save();
  
  if(perspective==='behind'){
    // Behind view - slight scaling illusion
    const cx=W/2,baseY=H*0.75;
    
    // Sky
    const skyGrad=ctx.createLinearGradient(0,0,0,H*0.4);
    skyGrad.addColorStop(0,'#0a0a1a');skyGrad.addColorStop(1,'#151520');
    ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H*0.4);
    
    // Ground
    ctx.fillStyle='#1a1a10';ctx.fillRect(0,H*0.4,W,H*0.6);
    
    // Road (perspective trapezoid)
    const roadTopW=120,roadBotW=ROAD_W*1.2;
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();
    ctx.moveTo(cx-roadBotW/2,H);ctx.lineTo(cx-roadTopW/2,H*0.42);
    ctx.lineTo(cx+roadTopW/2,H*0.42);ctx.lineTo(cx+roadBotW/2,H);
    ctx.fill();
    
    // Lane lines
    for(let lane=-1;lane<=1;lane++){
      const topX=cx+lane*(roadTopW/4);
      const botX=cx+lane*(roadBotW/4);
      ctx.strokeStyle='#555';ctx.lineWidth=2;ctx.setLineDash([15,15]);
      ctx.beginPath();ctx.moveTo(botX,H);ctx.lineTo(topX,H*0.42);ctx.stroke();
      ctx.setLineDash([]);
    }
    
    // Speed lines when going fast
    if(localPlayer.speed>150){
      const alpha=Math.min(0.4,(localPlayer.speed-150)/400);
      ctx.strokeStyle=`rgba(255,255,200,${alpha})`;ctx.lineWidth=1;
      for(let i=0;i<8;i++){
        const sx=cx+(Math.random()-0.5)*roadBotW;
        const sy=H*0.5+Math.random()*H*0.5;
        ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+(sx-cx)*0.1,sy+30+localPlayer.speed*0.1);ctx.stroke();
      }
    }
    
    // Draw other players
    const now=Date.now();
    Object.entries(players).forEach(([id,p])=>{
      if(id===myId||!p||now-p.t>5000)return;
      const dy=p.y-camY;
      if(dy<-200||dy>2000)return;
      const t=1-dy/2000;// 0=far, 1=close
      if(t<0)return;
      const scale=0.3+t*0.7;
      const screenX=cx+(p.x-localPlayer.x)*scale*0.8;
      const screenY=H*0.42+(H*0.58)*t;
      const car=CARS[p.car||0];
      const cw=30*scale,ch=50*scale;
      ctx.fillStyle=car.color;
      ctx.fillRect(screenX-cw/2,screenY-ch,cw,ch);
      ctx.fillStyle='#fff';ctx.font=`bold ${10*scale}px Orbitron`;ctx.textAlign='center';
      ctx.fillText(p.name||'',screenX,screenY-ch-4*scale);
    });
    
    // My car
    const mw=40,mh=60;
    const mx=cx;
    const my=baseY;
    const car=myCar||CARS[0];
    
    // Car body
    ctx.fillStyle=car.color;
    ctx.beginPath();
    ctx.moveTo(mx-mw/2,my);ctx.lineTo(mx-mw/2+5,my-mh);
    ctx.lineTo(mx+mw/2-5,my-mh);ctx.lineTo(mx+mw/2,my);
    ctx.fill();
    // Windshield
    ctx.fillStyle='#1a2a3a';
    ctx.fillRect(mx-mw/3,my-mh+10,mw/1.5,mh*0.3);
    // Wheels
    ctx.fillStyle='#111';
    ctx.fillRect(mx-mw/2-4,my-12,6,14);ctx.fillRect(mx+mw/2-2,my-12,6,14);
    
    // Nitro flame
    if(localPlayer.nitroOn){
      ctx.fillStyle='#f0c020';ctx.globalAlpha=0.5+Math.random()*0.5;
      ctx.beginPath();ctx.moveTo(mx-8,my);ctx.lineTo(mx,my+20+Math.random()*15);ctx.lineTo(mx+8,my);ctx.fill();
      ctx.globalAlpha=1;
    }
    
  } else {
    // Top-down view
    const cx=W/2-camX,cy=H*0.7;
    
    // Road
    const roadLeft=cx-ROAD_W/2,roadRight=cx+ROAD_W/2;
    ctx.fillStyle='#2a2a2a';
    ctx.fillRect(roadLeft,0,ROAD_W,H);
    
    // Lane markings
    ctx.strokeStyle='#444';ctx.lineWidth=2;ctx.setLineDash([20,20]);
    for(let i=1;i<LANES;i++){
      const lx=roadLeft+i*LANE_W;
      ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,H);ctx.stroke();
    }
    ctx.setLineDash([]);
    
    // Road edges
    ctx.strokeStyle='#888';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(roadLeft,0);ctx.lineTo(roadLeft,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(roadRight,0);ctx.lineTo(roadRight,H);ctx.stroke();
    
    // Shoulder stripes
    for(let sy=-camY%40;sy<H;sy+=40){
      ctx.fillStyle='#c03030';ctx.fillRect(roadLeft-12,sy,12,20);
      ctx.fillStyle='#fff';ctx.fillRect(roadRight,sy,12,20);
    }
    
    // Distance markers
    for(let d=0;d<TRACK_LEN*LAPS;d+=500){
      const screenY=cy-(d-camY)*0.5;
      if(screenY<-20||screenY>H+20)continue;
      ctx.fillStyle='#333';ctx.font='9px Orbitron';ctx.textAlign='right';
      ctx.fillText((d/1000).toFixed(1)+'km',roadLeft-16,screenY+3);
    }
    
    // Lap markers
    for(let l=1;l<=LAPS;l++){
      const ly=cy-(l*TRACK_LEN-camY)*0.5;
      if(ly>-20&&ly<H+20){
        ctx.fillStyle='rgba(240,192,32,0.3)';ctx.fillRect(roadLeft,ly-2,ROAD_W,4);
        ctx.fillStyle='#f0c020';ctx.font='bold 11px Orbitron';ctx.textAlign='center';
        ctx.fillText(l===LAPS?'FINISH':'LAP '+(l+1),cx,ly-6);
      }
    }
    
    // Start line
    const startY=cy-(-camY)*0.5;
    if(startY>-20&&startY<H+20){
      ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(roadLeft,startY-2,ROAD_W,4);
    }
    
    // Scenery
    roadObjs.forEach(obj=>{
      const sy=cy-(obj.y-camY)*0.5;
      if(sy<-30||sy>H+30)return;
      const sx=cx+obj.x;
      if(obj.type==='tree'){
        ctx.fillStyle=obj.color;
        ctx.beginPath();ctx.arc(sx,sy,10,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#3a2a1a';ctx.fillRect(sx-2,sy+8,4,8);
      } else {
        ctx.fillStyle='#555';ctx.fillRect(sx-2,sy-12,4,16);
        ctx.fillStyle='#f0c020';ctx.fillRect(sx-6,sy-12,12,8);
      }
    });
    
    // Other players
    const now=Date.now();
    Object.entries(players).forEach(([id,p])=>{
      if(id===myId||!p||now-p.t>5000)return;
      const px=cx+p.x,py=cy-(p.y-camY)*0.5;
      if(py<-40||py>H+40)return;
      const car=CARS[p.car||0];
      ctx.save();ctx.translate(px,py);
      ctx.fillStyle=car.color;
      ctx.fillRect(-10,-18,20,36);
      ctx.fillStyle='#1a2a3a';ctx.fillRect(-7,-14,14,10);
      ctx.fillStyle='#111';
      ctx.fillRect(-12,-14,3,8);ctx.fillRect(9,-14,3,8);
      ctx.fillRect(-12,10,3,8);ctx.fillRect(9,10,3,8);
      ctx.fillStyle='#fff';ctx.font='bold 8px Rajdhani';ctx.textAlign='center';
      ctx.fillText(p.name||'',0,-24);
      ctx.restore();
    });
    
    // My car
    const mx=cx+localPlayer.x,my=cy;
    ctx.save();ctx.translate(mx,my);
    const car=myCar||CARS[0];
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-12,-16,24,38);
    // Body
    ctx.fillStyle=car.color;
    ctx.fillRect(-10,-18,20,36);
    // Windshield
    ctx.fillStyle='#1a2a3a';ctx.fillRect(-7,-14,14,10);
    // Wheels
    ctx.fillStyle='#111';
    ctx.fillRect(-12,-14,3,8);ctx.fillRect(9,-14,3,8);
    ctx.fillRect(-12,10,3,8);ctx.fillRect(9,10,3,8);
    // Nitro flame
    if(localPlayer.nitroOn){
      ctx.fillStyle='#f0c020';ctx.globalAlpha=0.5+Math.random()*0.5;
      ctx.beginPath();ctx.moveTo(-6,18);ctx.lineTo(0,30+Math.random()*10);ctx.lineTo(6,18);ctx.fill();
      ctx.globalAlpha=1;
    }
    // Name
    ctx.fillStyle='#fff';ctx.font='bold 9px Orbitron';ctx.textAlign='center';
    ctx.fillText(myName,0,-24);
    ctx.restore();
  }
  
  ctx.restore();
}

function updateHUD(){
  if(!localPlayer)return;
  document.getElementById('h-speed').textContent=Math.floor(Math.abs(localPlayer.speed));
  document.getElementById('h-lap').textContent=localPlayer.lap+'/'+LAPS;
  document.getElementById('h-nitro').style.width=localPlayer.nitro+'%';
  
  // Position
  const allP=Object.entries(players);
  const sorted=[...allP].sort((a,b)=>(b[1].y||0)-(a[1].y||0));
  const myPos=sorted.findIndex(([id])=>id===myId)+1;
  document.getElementById('h-pos').textContent=myPos>0?('#'+myPos):'-';
}

// ═══ INPUT ═══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();
  if(k==='p'&&gameOn){perspective=perspective==='top'?'behind':'top';}
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});

function backToMenu(){
  gameOn=false;
  document.getElementById('hud').style.display='none';
  document.getElementById('finish').style.display='none';
  showScreen('menu');
}

// Enter key shortcuts
document.getElementById('join-code').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
document.getElementById('my-name').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('join-code').focus();});
</script>
