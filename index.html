<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM RACING</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:#e0ddd5}
canvas{display:block}
.screen{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#0a0a0f}.screen.active{display:flex}
.logo{font-family:'Orbitron',sans-serif;font-size:3.2rem;font-weight:900;letter-spacing:8px;margin-bottom:2px}.logo .zm{color:#e8293a}.logo .r{color:#e0ddd5}
.logo-sub{color:#555;font-size:.65rem;letter-spacing:6px;font-family:'Orbitron',sans-serif;margin-bottom:28px}
.card{background:#111118;border:1px solid #1e1e2a;padding:22px;max-width:420px;width:100%;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e8293a,#f07020,#f0c020)}
.card h2{font-family:'Orbitron',sans-serif;font-size:.9rem;color:#f0c020;margin-bottom:14px;letter-spacing:3px}
.field{margin-bottom:12px}
.field label{display:block;font-size:.6rem;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;font-family:'Orbitron',sans-serif}
.field input{width:100%;padding:9px 12px;background:#0a0a0f;border:1px solid #1e1e2a;color:#e0ddd5;font-family:'Rajdhani',sans-serif;font-size:.85rem;outline:none}
.field input:focus{border-color:#e8293a}
.btn{display:block;width:100%;padding:12px;font-family:'Orbitron',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:3px;border:none;cursor:pointer;text-transform:uppercase}
.btn-red{background:#e8293a;color:#fff}.btn-red:hover{filter:brightness(1.2)}
.btn-dark{background:#1e1e2a;color:#e0ddd5;margin-top:6px}
.divider{text-align:center;color:#555;margin:12px 0;font-size:.65rem;letter-spacing:4px;font-family:'Orbitron',sans-serif}
.room-code{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;color:#f0c020;letter-spacing:10px;text-align:center;margin:8px 0;padding:8px;background:#0a0a0f;border:2px dashed #f0c020}
.plist{list-style:none;margin:8px 0}.plist li{padding:6px 8px;background:#0a0a0f;border:1px solid #1e1e2a;margin-bottom:3px;font-size:.75rem;display:flex;align-items:center;gap:6px}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.info{text-align:center;color:#555;font-size:.6rem;margin-top:8px;letter-spacing:2px;font-family:'Orbitron',sans-serif}
.car-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px 0}
.car-opt{background:#0a0a0f;border:2px solid #1e1e2a;padding:10px 6px;text-align:center;cursor:pointer;transition:all .12s}
.car-opt:hover{border-color:#555}.car-opt.sel{border-color:#f0c020;box-shadow:0 0 15px rgba(240,192,32,.12)}
.car-opt .cn{font-family:'Orbitron',sans-serif;font-size:.5rem;color:#f0c020;letter-spacing:1px;margin-top:3px}
.car-opt .cs{font-size:.5rem;color:#555;margin-top:1px}
.car-swatch{width:30px;height:16px;margin:0 auto 4px;border-radius:3px}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;justify-content:space-between;padding:6px 12px;pointer-events:none}
.hl,.hr{pointer-events:auto;background:rgba(0,0,0,.75);border:1px solid #1e1e2a;padding:5px 10px;font-size:.7rem;backdrop-filter:blur(4px)}
.hv{font-family:'Orbitron',sans-serif;font-weight:700;color:#f0c020}
.hd{color:#555;font-size:.55rem;letter-spacing:1px;font-family:'Orbitron',sans-serif}
.nbar{width:80px;height:5px;background:#1e1e2a;display:inline-block;vertical-align:middle;margin-top:2px}
.nfill{height:100%;background:linear-gradient(90deg,#f07020,#f0c020);transition:width .1s}
#finish{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.92)}
#finish h1{font-family:'Orbitron',sans-serif;font-size:2rem;color:#f0c020;letter-spacing:5px;text-align:center;margin-bottom:6px}
#finish p{color:#555;text-align:center;margin-bottom:12px;font-size:.8rem}
.fl{list-style:none;margin:12px auto;max-width:280px}
.fl li{padding:6px 10px;background:#111118;border:1px solid #1e1e2a;margin-bottom:3px;display:flex;justify-content:space-between;font-size:.75rem}
.fp{font-family:'Orbitron',sans-serif;color:#f0c020;font-weight:700}
#countdown{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.6);font-family:'Orbitron',sans-serif;font-size:6rem;font-weight:900;color:#f0c020;text-shadow:0 0 40px rgba(240,192,32,.4)}
</style>
</head>
<body>
<div id="menu" class="screen active">

  <div class="card"><h2>Enter The Race</h2>

<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database(),RT='zm_racing3';

const CARS=[
  {id:'zm_bolt',name:'ZM Bolt',color:0xe8293a,hex:'#e8293a',top:280,acc:1.6,hnd:.85},
  {id:'zm_phantom',name:'ZM Phantom',color:0x2090f0,hex:'#2090f0',top:300,acc:1.3,hnd:.9},
  {id:'zm_viper',name:'ZM Viper',color:0x20c060,hex:'#20c060',top:320,acc:1.1,hnd:.75},
  {id:'zm_fury',name:'ZM Fury',color:0xf07020,hex:'#f07020',top:260,acc:2.0,hnd:.8},
  {id:'zm_spectre',name:'ZM Spectre',color:0x9040e0,hex:'#9040e0',top:310,acc:1.2,hnd:.95},
  {id:'zm_thunder',name:'ZM Thunder',color:0xf0c020,hex:'#f0c020',top:340,acc:0.9,hnd:.7},
];
const LAPS=3;

// ═══ TRACK PATH (spline control points) ═══
const trackPoints=[
  [0,0],[80,0],[160,30],[200,80],[200,160],[160,220],
  [100,260],[40,280],[0,340],[-20,420],[0,500],[60,540],
  [140,560],[200,520],[240,460],[280,400],[320,360],
  [360,320],[380,240],[360,160],[320,100],[260,60],
  [200,20],[140,0],[80,0],[0,0]
];

let scene,camera,renderer,clock;
let trackCurve,trackLen;
let carMesh,carBody;
let trackProgress=0,speed=0,lateralOff=0;
let nitro=100,nitroOn=false,nitroCool=0;
let lap=1,finished=false,finishTime=0,raceStarted=false;
let cameraMode='chase'; // 'chase','top','hood'
let keys={};
let myId,myName='',roomId,roomRef,isHost=false;
let players={},remoteCars={};
let myCarIdx=0,myCar=null;
let groundMesh,barrierMeshes=[],treeMeshes=[],buildingMeshes=[];

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<5;i++)r+=c[~~(Math.random()*c.length)];return r}
function genId(){return'r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ═══ FIREBASE ═══
async function createRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  myId=genId();roomId=genCode();roomRef=db.ref(RT+'/'+roomId);isHost=true;
  await roomRef.set({code:roomId,host:myId,status:'lobby',players:{[myId]:{name:myName,ready:false,car:null}}});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}
async function joinRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){alert('Enter code');return;}
  roomRef=db.ref(RT+'/'+code);const snap=await roomRef.once('value');
  if(!snap.exists()){alert('Not found');return;}
  if(snap.val().status==='racing'){alert('Already racing');return;}
  myId=genId();roomId=code;isHost=false;
  await roomRef.child('players/'+myId).set({name:myName,ready:false,car:null});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}
function setupLobby(){
  const colors=['#e8293a','#2090f0','#20c060','#f07020','#9040e0','#f0c020','#20d0d0','#ccc'];
  roomRef.child('players').on('value',snap=>{
    const pl=snap.val()||{},list=document.getElementById('lb-pl');list.innerHTML='';let i=0;
    Object.entries(pl).forEach(([id,p])=>{const li=document.createElement('li');li.innerHTML=`<span class="pdot" style="background:${colors[i%8]}"></span>${p.name}${id===myId?' (You)':''}`;list.appendChild(li);i++;});
    const n=Object.keys(pl).length;
    document.getElementById('lb-go').style.display=(isHost&&n>=1)?'block':'none';
    document.getElementById('lb-st').textContent=n+' driver'+(n>1?'s':'');
  });
  roomRef.child('status').on('value',snap=>{
    if(snap.val()==='carselect')showCarSelect();
    if(snap.val()==='racing')initRace();
  });
}
function hostStart(){roomRef.child('status').set('carselect');}

function showCarSelect(){
  showScreen('carsel');const grid=document.getElementById('cg');grid.innerHTML='';
  CARS.forEach((car,i)=>{
    const d=document.createElement('div');d.className='car-opt'+(i===0?' sel':'');
    d.innerHTML=`<div class="car-swatch" style="background:${car.hex}"></div><div class="cn">${car.name}</div><div class="cs">SPD ${car.top} · ACC ${car.acc} · HND ${(car.hnd*100)|0}%</div>`;
    d.onclick=()=>{grid.querySelectorAll('.car-opt').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');myCarIdx=i;};
    grid.appendChild(d);
  });
}
async function confirmCar(){
  myCar=CARS[myCarIdx];
  await roomRef.child('players/'+myId).update({car:myCarIdx,ready:true});
  document.getElementById('cs-st').textContent='Locked in! Waiting...';
  if(isHost){
    roomRef.child('players').on('value',async snap=>{
      const pl=snap.val()||{};
      if(Object.values(pl).every(p=>p.ready&&p.car!==null))
        await roomRef.child('status').set('racing');
    });
  }
}

// ═══ 3D INIT ═══
function initRace(){
  myCar=CARS[myCarIdx]||CARS[0];
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('hud').style.display='flex';
  document.getElementById('finish').style.display='none';
  
  // Three.js setup
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x0a0a12,0.003);
  scene.background=new THREE.Color(0x0a0a12);
  
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.5,2000);
  renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=0.8;
  document.body.appendChild(renderer.domElement);
  
  window.addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  
  clock=new THREE.Clock();
  
  // Lighting
  const ambient=new THREE.AmbientLight(0x303050,0.6);scene.add(ambient);
  const dirLight=new THREE.DirectionalLight(0xffeedd,0.8);
  dirLight.position.set(100,200,100);dirLight.castShadow=true;
  dirLight.shadow.mapSize.set(2048,2048);
  dirLight.shadow.camera.near=10;dirLight.shadow.camera.far=600;
  dirLight.shadow.camera.left=-300;dirLight.shadow.camera.right=300;
  dirLight.shadow.camera.top=300;dirLight.shadow.camera.bottom=-300;
  scene.add(dirLight);
  
  // Moon
  const moonGeo=new THREE.SphereGeometry(15,16,16);
  const moonMat=new THREE.MeshBasicMaterial({color:0xeeeedd});
  const moon=new THREE.Mesh(moonGeo,moonMat);
  moon.position.set(-200,250,-400);scene.add(moon);
  
  // Build track spline
  const pts3d=trackPoints.map(p=>new THREE.Vector3(p[0]*2,0,p[1]*2));
  trackCurve=new THREE.CatmullRomCurve3(pts3d,true,'catmullrom',0.5);
  trackLen=trackCurve.getLength();
  
  // Ground plane
  const groundGeo=new THREE.PlaneGeometry(2000,2000);
  const groundMat=new THREE.MeshLambertMaterial({color:0x0a1a0a});
  groundMesh=new THREE.Mesh(groundGeo,groundMat);
  groundMesh.rotation.x=-Math.PI/2;groundMesh.position.y=-0.1;
  groundMesh.receiveShadow=true;scene.add(groundMesh);
  
  // Build road mesh
  buildRoadMesh();
  
  // Scenery
  buildScenery();
  
  // Player car
  carBody=buildCarModel(myCar.color);
  scene.add(carBody);
  
  // State
  trackProgress=0;speed=0;lateralOff=0;
  nitro=100;nitroOn=false;nitroCool=0;
  lap=1;finished=false;finishTime=0;raceStarted=false;
  cameraMode='chase';
  
  // Firebase race sync
  roomRef.child('race').on('value',snap=>{players=snap.val()||{};updateRemoteCars();});
  setInterval(syncPos,80);
  
  // Countdown then start
  doCountdown();
  
  animate();
}

function buildCarModel(color){
  const group=new THREE.Group();
  // Body
  const bodyGeo=new THREE.BoxGeometry(2,0.8,4.5);
  const bodyMat=new THREE.MeshPhongMaterial({color,shininess:100,specular:0x444444});
  const body=new THREE.Mesh(bodyGeo,bodyMat);body.position.y=0.6;body.castShadow=true;
  group.add(body);
  // Roof
  const roofGeo=new THREE.BoxGeometry(1.6,0.6,2);
  const roofMat=new THREE.MeshPhongMaterial({color:0x1a2a3a,shininess:60,specular:0x222222,transparent:true,opacity:0.7});
  const roof=new THREE.Mesh(roofGeo,roofMat);roof.position.set(0,1.15,-0.3);
  group.add(roof);
  // Wheels
  const wGeo=new THREE.CylinderGeometry(0.35,0.35,0.3,12);
  const wMat=new THREE.MeshPhongMaterial({color:0x1a1a1a});
  [[-1,0.35,1.5],[1,0.35,1.5],[-1,0.35,-1.5],[1,0.35,-1.5]].forEach(p=>{
    const w=new THREE.Mesh(wGeo,wMat);w.rotation.z=Math.PI/2;
    w.position.set(p[0],p[1],p[2]);w.castShadow=true;group.add(w);
  });
  // Headlights
  const hlGeo=new THREE.SphereGeometry(0.15,8,8);
  const hlMat=new THREE.MeshBasicMaterial({color:0xffffcc});
  [[-0.6,0.6,-2.2],[0.6,0.6,-2.2]].forEach(p=>{
    const hl=new THREE.Mesh(hlGeo,hlMat);hl.position.set(...p);group.add(hl);
  });
  // Tail lights
  const tlMat=new THREE.MeshBasicMaterial({color:0xff2020});
  [[-0.7,0.6,2.2],[0.7,0.6,2.2]].forEach(p=>{
    const tl=new THREE.Mesh(hlGeo,tlMat);tl.position.set(...p);group.add(tl);
  });
  // Headlight beams
  const beamGeo=new THREE.ConeGeometry(2,15,8,1,true);
  const beamMat=new THREE.MeshBasicMaterial({color:0xffffdd,transparent:true,opacity:0.04,side:THREE.DoubleSide});
  const beam=new THREE.Mesh(beamGeo,beamMat);
  beam.rotation.x=Math.PI/2;beam.position.set(0,0.5,-9);
  group.add(beam);
  
  return group;
}

function buildRoadMesh(){
  const segments=600;
  const roadW=8;
  const shape=new THREE.Shape();
  // Road surface using tube-like approach
  const pts=trackCurve.getSpacedPoints(segments);
  const frames=trackCurve.computeFrenetFrames(segments,true);
  
  const roadGeo=new THREE.BufferGeometry();
  const verts=[],uvs=[],indices=[];
  
  for(let i=0;i<=segments;i++){
    const p=pts[i];
    const N=frames.normals[i];
    const B=frames.binormals[i];
    // Left and right edge
    for(let j=-1;j<=1;j+=2){
      const off=j*roadW;
      verts.push(p.x+B.x*off, 0.01, p.z+B.z*off);
      uvs.push(i/segments*100, j===-1?0:1);
    }
  }
  for(let i=0;i<segments;i++){
    const a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;
    indices.push(a,c,b, b,c,d);
  }
  roadGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  roadGeo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  roadGeo.setIndex(indices);
  roadGeo.computeVertexNormals();
  
  // Road material - dark asphalt
  const roadMat=new THREE.MeshLambertMaterial({color:0x333338});
  const road=new THREE.Mesh(roadGeo,roadMat);road.receiveShadow=true;
  scene.add(road);
  
  // Lane markings as thin strips
  for(let lane=-1;lane<=1;lane++){
    if(lane===0) continue;
    const laneGeo=new THREE.BufferGeometry();
    const lv=[],li=[];
    const lw=0.08;
    for(let i=0;i<=segments;i++){
      const p=pts[i];const B=frames.binormals[i];
      const off=lane*roadW*0.33;
      for(let j=-1;j<=1;j+=2){
        lv.push(p.x+B.x*(off+j*lw),0.02,p.z+B.z*(off+j*lw));
      }
    }
    for(let i=0;i<segments;i++){
      const a=i*2,b=i*2+1,c=(i+1)*2,d=(i+1)*2+1;
      // Dashed: only every other 3 segments
      if(Math.floor(i/3)%2===0) li.push(a,c,b,b,c,d);
    }
    laneGeo.setAttribute('position',new THREE.Float32BufferAttribute(lv,3));
    laneGeo.setIndex(li);
    const laneMat=new THREE.MeshBasicMaterial({color:0xcccccc});
    scene.add(new THREE.Mesh(laneGeo,laneMat));
  }
  
  // Barriers (inside and outside of curves)
  const barrierGeo=new THREE.BoxGeometry(0.4,1.2,2);
  const barrierMat=new THREE.MeshPhongMaterial({color:0x888888});
  const barrierRedMat=new THREE.MeshPhongMaterial({color:0xcc2020});
  for(let i=0;i<segments;i+=4){
    const p=pts[i];const B=frames.binormals[i];
    for(let side=-1;side<=1;side+=2){
      const off=side*(roadW+1);
      const b=new THREE.Mesh(barrierGeo,i%8<4?barrierMat:barrierRedMat);
      b.position.set(p.x+B.x*off,0.6,p.z+B.z*off);
      const tangent=frames.tangents[i];
      b.lookAt(b.position.x+tangent.x,0.6,b.position.z+tangent.z);
      b.castShadow=true;scene.add(b);
    }
  }
  
  // Start/Finish line
  const sfGeo=new THREE.PlaneGeometry(roadW*2,1.5);
  const sfMat=new THREE.MeshBasicMaterial({color:0xffffff,side:THREE.DoubleSide});
  const sf=new THREE.Mesh(sfGeo,sfMat);
  sf.rotation.x=-Math.PI/2;
  const sp=pts[0];sf.position.set(sp.x,0.03,sp.z);
  const st=frames.tangents[0];
  sf.lookAt(sf.position.x+st.x,0.03,sf.position.z+st.z);
  sf.rotateX(Math.PI/2);
  scene.add(sf);
}

function buildScenery(){
  // Trees
  const trunkGeo=new THREE.CylinderGeometry(0.2,0.3,3,6);
  const trunkMat=new THREE.MeshLambertMaterial({color:0x3a2a10});
  const leafGeo=new THREE.SphereGeometry(1.5,8,6);
  const leafMat=new THREE.MeshLambertMaterial({color:0x1a5a2a});
  
  const pts=trackCurve.getSpacedPoints(200);
  const frames=trackCurve.computeFrenetFrames(200,true);
  
  for(let i=0;i<200;i+=2){
    if(Math.random()>0.4)continue;
    const p=pts[i];const B=frames.binormals[i];
    const side=(Math.random()>0.5?1:-1);
    const dist=12+Math.random()*25;
    const x=p.x+B.x*side*dist;
    const z=p.z+B.z*side*dist;
    
    if(Math.random()>0.3){
      // Tree
      const trunk=new THREE.Mesh(trunkGeo,trunkMat);
      trunk.position.set(x,1.5,z);trunk.castShadow=true;scene.add(trunk);
      const leaf=new THREE.Mesh(leafGeo,leafMat);
      leaf.position.set(x,4,z);leaf.castShadow=true;scene.add(leaf);
    } else {
      // Building
      const bw=3+Math.random()*6,bh=8+Math.random()*20,bd=3+Math.random()*6;
      const bGeo=new THREE.BoxGeometry(bw,bh,bd);
      const bMat=new THREE.MeshPhongMaterial({color:new THREE.Color().setHSL(0,0,0.1+Math.random()*0.1)});
      const b=new THREE.Mesh(bGeo,bMat);
      b.position.set(x,bh/2,z);b.castShadow=true;scene.add(b);
      // Windows
      const winMat=new THREE.MeshBasicMaterial({color:0xf0c050});
      for(let wy=2;wy<bh-1;wy+=2.5){
        for(let wx=-bw/2+1;wx<bw/2;wx+=2){
          if(Math.random()>0.4){
            const win=new THREE.Mesh(new THREE.PlaneGeometry(0.8,1),winMat);
            win.position.set(x+wx,wy,z-bd/2-0.01);scene.add(win);
          }
        }
      }
    }
  }
  
  // Street lamps along track
  const lampGeo=new THREE.CylinderGeometry(0.08,0.1,6,6);
  const lampMat=new THREE.MeshLambertMaterial({color:0x555555});
  for(let i=0;i<200;i+=6){
    const p=pts[i];const B=frames.binormals[i];
    for(let side=-1;side<=1;side+=2){
      const dist=side*10;
      const lamp=new THREE.Mesh(lampGeo,lampMat);
      lamp.position.set(p.x+B.x*dist,3,p.z+B.z*dist);scene.add(lamp);
      const light=new THREE.PointLight(0xffeebb,0.5,20);
      light.position.set(p.x+B.x*dist,6,p.z+B.z*dist);
      if(i%18===0) scene.add(light); // every 3rd lamp has light (performance)
    }
  }
}

function doCountdown(){
  const el=document.getElementById('countdown');el.style.display='flex';
  let count=3;el.textContent=count;
  const iv=setInterval(()=>{
    count--;
    if(count>0){el.textContent=count;}
    else if(count===0){el.textContent='GO!';el.style.color='#20c060';}
    else{el.style.display='none';raceStarted=true;clearInterval(iv);}
  },1000);
}

// ═══ GAME LOOP ═══
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  if(raceStarted&&!finished) update(dt);
  updateCamera(dt);
  renderer.render(scene,camera);
  updateHUD();
}

function update(dt){
  const car=myCar||CARS[0];
  const maxSpd=car.top*(nitroOn?1.35:1);
  const acc=car.acc*80;
  const hnd=car.hnd;
  
  if(keys['w']||keys['arrowup'])speed=Math.min(maxSpd,speed+acc*dt);
  else if(keys['s']||keys['arrowdown'])speed=Math.max(-40,speed-acc*2*dt);
  else{speed*=0.985;if(Math.abs(speed)<1)speed=0;}
  
  // Steering
  const steerAmt=12*hnd*dt*(0.3+speed/maxSpd*0.7);
  if(keys['a']||keys['arrowleft'])lateralOff-=steerAmt;
  if(keys['d']||keys['arrowright'])lateralOff+=steerAmt;
  lateralOff=Math.max(-7,Math.min(7,lateralOff));
  // Off road penalty
  if(Math.abs(lateralOff)>6.5)speed*=0.96;
  
  // Nitro
  if(keys['n']&&nitro>0&&nitroCool<=0){
    nitroOn=true;nitro-=30*dt;
    if(nitro<=0){nitro=0;nitroOn=false;nitroCool=2;}
  } else {
    nitroOn=false;
    if(nitroCool>0)nitroCool-=dt;
    if(!keys['n']&&nitroCool<=0)nitro=Math.min(100,nitro+10*dt);
  }
  
  // Progress along track
  const dist=speed*dt*0.08;
  trackProgress+=dist/trackLen;
  
  // Laps
  const totalLaps=Math.floor(trackProgress);
  if(totalLaps>=LAPS&&!finished){
    finished=true;finishTime=Date.now();syncPos();
    setTimeout(showFinish,1500);
  }
  lap=Math.min(LAPS,totalLaps+1);
  
  // Position car on track
  const t=(trackProgress%1+1)%1;
  const pos=trackCurve.getPointAt(t);
  const tangent=trackCurve.getTangentAt(t);
  const up=new THREE.Vector3(0,1,0);
  const right=new THREE.Vector3().crossVectors(up,tangent).normalize();
  
  carBody.position.set(
    pos.x+right.x*lateralOff,
    0.4,
    pos.z+right.z*lateralOff
  );
  // Face direction of travel
  const lookTarget=new THREE.Vector3(
    carBody.position.x+tangent.x*10,
    0.4,
    carBody.position.z+tangent.z*10
  );
  carBody.lookAt(lookTarget);
  
  // Tilt on steering
  const steerInput=((keys['a']||keys['arrowleft'])?1:0)-((keys['d']||keys['arrowright'])?1:0);
  carBody.rotation.z=steerInput*0.08*(speed/maxSpd);
  
  // Nitro flame (scale tail lights)
  if(nitroOn){
    carBody.children.forEach(c=>{
      if(c.material&&c.material.color&&c.material.color.r>0.9&&c.material.color.g<0.2){
        c.scale.set(1+Math.random()*2,1+Math.random()*2,1+Math.random()*2);
      }
    });
  }
}

function updateCamera(dt){
  if(!carBody)return;
  const carPos=carBody.position.clone();
  const carDir=new THREE.Vector3(0,0,-1).applyQuaternion(carBody.quaternion);
  
  let targetPos,lookAt;
  if(cameraMode==='chase'){
    targetPos=carPos.clone().add(carDir.clone().multiplyScalar(12)).add(new THREE.Vector3(0,5,0));
    lookAt=carPos.clone().add(carDir.clone().multiplyScalar(-8));
  } else if(cameraMode==='top'){
    targetPos=carPos.clone().add(new THREE.Vector3(0,30,0));
    lookAt=carPos;
  } else { // hood
    targetPos=carPos.clone().add(new THREE.Vector3(0,1.5,0)).add(carDir.clone().multiplyScalar(-1));
    lookAt=carPos.clone().add(carDir.clone().multiplyScalar(-20));
  }
  
  // Smooth camera
  camera.position.lerp(targetPos,0.06);
  const currentLook=new THREE.Vector3();
  camera.getWorldDirection(currentLook);
  camera.lookAt(lookAt);
  
  // Shake at high speed
  if(speed>150){
    const s=(speed-150)/300*0.15*(nitroOn?3:1);
    camera.position.x+=(Math.random()-.5)*s;
    camera.position.y+=(Math.random()-.5)*s*0.5;
  }
}

// ═══ REMOTE PLAYERS ═══
function updateRemoteCars(){
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(id===myId||!p||now-p.t>5000)return;
    if(!remoteCars[id]){
      const car=CARS[p.car||0];
      remoteCars[id]=buildCarModel(car.color);
      scene.add(remoteCars[id]);
    }
    // Position on track
    const t=((p.prog||0)%1+1)%1;
    const pos=trackCurve.getPointAt(t);
    const tangent=trackCurve.getTangentAt(t);
    const up=new THREE.Vector3(0,1,0);
    const right=new THREE.Vector3().crossVectors(up,tangent).normalize();
    const rc=remoteCars[id];
    rc.position.set(pos.x+right.x*(p.lat||0),0.4,pos.z+right.z*(p.lat||0));
    const lt=new THREE.Vector3(rc.position.x+tangent.x*10,0.4,rc.position.z+tangent.z*10);
    rc.lookAt(lt);
  });
  // Remove disconnected
  Object.keys(remoteCars).forEach(id=>{
    if(!players[id]||now-players[id].t>5000){
      scene.remove(remoteCars[id]);delete remoteCars[id];
    }
  });
}

function syncPos(){
  if(!roomRef||!myId)return;
  roomRef.child('race/'+myId).set({
    prog:trackProgress,lat:lateralOff,spd:speed|0,
    car:myCarIdx,name:myName,lap,finished,ft:finishTime||0,t:Date.now()
  });
}

function updateHUD(){
  document.getElementById('h-spd').textContent=Math.floor(Math.abs(speed));
  document.getElementById('h-lap').textContent=lap+'/'+LAPS;
  document.getElementById('h-nit').style.width=nitro+'%';
  const all=Object.entries(players).sort((a,b)=>(b[1].prog||0)-(a[1].prog||0));
  const pos=all.findIndex(([id])=>id===myId)+1;
  document.getElementById('h-pos').textContent=pos>0?'#'+pos:'-';
}

async function showFinish(){
  const snap=await roomRef.child('race').once('value');
  const rd=snap.val()||{};
  const results=Object.entries(rd).filter(([,p])=>p.finished).sort((a,b)=>a[1].ft-b[1].ft);
  const list=document.getElementById('fin-l');list.innerHTML='';
  results.forEach(([id,p],i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="fp">#${i+1}</span><span>${p.name} — ${CARS[p.car||0].name}</span>`;
    if(id===myId)li.style.borderColor='#f0c020';
    list.appendChild(li);
  });
  Object.entries(rd).filter(([,p])=>!p.finished).forEach(([,p])=>{
    const li=document.createElement('li');li.innerHTML=`<span class="fp">DNF</span><span style="color:#555">${p.name}</span>`;
    list.appendChild(li);
  });
  document.getElementById('finish').style.display='flex';
}

function backToMenu(){
  raceStarted=false;gameOn=false;
  document.getElementById('hud').style.display='none';
  document.getElementById('finish').style.display='none';
  // Remove renderer
  if(renderer&&renderer.domElement)renderer.domElement.remove();
  showScreen('menu');
}

// ═══ INPUT ═══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key.toLowerCase();keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();
  if(k==='p'){
    if(cameraMode==='chase')cameraMode='hood';
    else if(cameraMode==='hood')cameraMode='top';
    else cameraMode='chase';
  }
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});
document.getElementById('join-code').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
</script>
