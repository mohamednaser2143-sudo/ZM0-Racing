<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZM RACING</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#111118;--border:#1e1e2a;--text:#e0ddd5;--dim:#555;--red:#e8293a;--orange:#f07020;--yellow:#f0c020;--blue:#2090f0;--green:#20c060;--purple:#9040e0}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:var(--text);font-family:'Rajdhani',sans-serif}
canvas{display:block}
.screen{display:none;position:fixed;inset:0;z-index:100;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg)}.screen.active{display:flex}
.logo{font-family:'Orbitron',sans-serif;font-size:3.5rem;font-weight:900;letter-spacing:8px;margin-bottom:2px}.logo .zm{color:var(--red)}.logo .r{color:var(--text)}
.logo-sub{color:var(--dim);font-size:.7rem;letter-spacing:6px;font-family:'Orbitron',sans-serif;margin-bottom:32px}
.card{background:var(--surface);border:1px solid var(--border);padding:24px;max-width:440px;width:100%;position:relative}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--orange),var(--yellow))}
.card h2{font-family:'Orbitron',sans-serif;font-size:1rem;color:var(--yellow);margin-bottom:16px;letter-spacing:3px}
.field{margin-bottom:14px}
.field label{display:block;font-size:.65rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-family:'Orbitron',sans-serif}
.field input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none}
.field input:focus{border-color:var(--red)}
.btn{display:block;width:100%;padding:13px;font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:3px;border:none;cursor:pointer;text-transform:uppercase}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{filter:brightness(1.2)}
.btn-dark{background:var(--border);color:var(--text);margin-top:8px}.btn-dark:hover{background:#2a2a3a}
.divider{text-align:center;color:var(--dim);margin:14px 0;font-size:.7rem;letter-spacing:4px;font-family:'Orbitron',sans-serif}
.room-code{font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;color:var(--yellow);letter-spacing:10px;text-align:center;margin:10px 0;padding:10px;background:var(--bg);border:2px dashed var(--yellow)}
.plist{list-style:none;margin:10px 0}.plist li{padding:7px 10px;background:var(--bg);border:1px solid var(--border);margin-bottom:3px;font-size:.8rem;display:flex;align-items:center;gap:8px}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.info{text-align:center;color:var(--dim);font-size:.65rem;margin-top:10px;letter-spacing:2px;font-family:'Orbitron',sans-serif}
.car-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.car-opt{background:var(--bg);border:2px solid var(--border);padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.car-opt:hover{border-color:var(--dim)}.car-opt.sel{border-color:var(--yellow);box-shadow:0 0 20px rgba(240,192,32,.15)}
.car-opt .cn{font-family:'Orbitron',sans-serif;font-size:.6rem;color:var(--yellow);letter-spacing:1px;margin-top:4px}
.car-opt .cs{font-size:.55rem;color:var(--dim);margin-top:2px}
#hud{position:fixed;top:0;left:0;right:0;z-index:50;display:none;justify-content:space-between;padding:8px 14px;pointer-events:none}
.hl,.hr{pointer-events:auto;background:rgba(0,0,0,.7);border:1px solid #1e1e2a;padding:6px 12px;font-size:.75rem;backdrop-filter:blur(4px)}
.hv{font-family:'Orbitron',sans-serif;font-weight:700;color:var(--yellow)}
.hd{color:var(--dim);font-size:.6rem;letter-spacing:1px;font-family:'Orbitron',sans-serif}
.nbar{width:100px;height:6px;background:#1e1e2a;display:inline-block;vertical-align:middle;margin-top:3px}
.nfill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));transition:width .1s}
#finish{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.9)}
.fb h1{font-family:'Orbitron',sans-serif;font-size:2.5rem;color:var(--yellow);letter-spacing:6px;margin-bottom:8px;text-align:center}
.fb p{color:var(--dim);text-align:center;margin-bottom:16px}
.fl{list-style:none;margin:16px auto;max-width:300px}
.fl li{padding:8px 12px;background:var(--surface);border:1px solid var(--border);margin-bottom:4px;display:flex;justify-content:space-between;font-size:.8rem}
.fp{font-family:'Orbitron',sans-serif;color:var(--yellow);font-weight:700}
</style>
</head>
<body>
<div id="menu" class="screen active">
  <div class="logo"><span class="zm">ZM</span> <span class="r">RACING</span></div>
  <div class="logo-sub">Feel The Speed</div>
  <div class="card"><h2>Enter The Race</h2>
    <div class="field"><label>Driver Name</label><input id="my-name" maxlength="12" placeholder="Your name..."></div>
    <button class="btn btn-red" onclick="createRoom()">Create Room</button>
    <div class="divider">— or join —</div>
    <div class="field"><label>Room Code</label><input id="join-code" maxlength="5" placeholder="ABCDE" style="text-transform:uppercase;text-align:center;font-family:'Orbitron',sans-serif;font-size:1.1rem;letter-spacing:6px"></div>
    <button class="btn btn-dark" onclick="joinRoom()">Join Room</button>
  </div>
</div>
<div id="lobby" class="screen"><div class="card" style="text-align:center"><h2>Race Lobby</h2>
  <div style="color:var(--dim);font-size:.6rem;letter-spacing:2px;font-family:'Orbitron'">ROOM CODE</div>
  <div class="room-code" id="lb-code">-----</div>
  <ul class="plist" id="lb-pl"></ul>
  <button class="btn btn-red" id="lb-go" onclick="hostStart()" style="display:none">Start Race</button>
  <div class="info" id="lb-st">Waiting...</div></div>
</div>
<div id="carsel" class="screen"><div class="card" style="max-width:500px"><h2>Choose Your Machine</h2>
  <div class="car-grid" id="cg"></div>
  <button class="btn btn-red" onclick="confirmCar()">Lock In</button>
  <div class="info" id="cs-st"></div></div>
</div>
<canvas id="gc"></canvas>
<div id="hud">
  <div class="hl"><span class="hd">SPD </span><span class="hv" id="h-spd">0</span><span class="hd"> km/h</span>&nbsp;&nbsp;<span class="hd">POS </span><span class="hv" id="h-pos">-</span>&nbsp;&nbsp;<span class="hd">LAP </span><span class="hv" id="h-lap">1/3</span></div>
  <div class="hr"><span class="hd">NITRO </span><div class="nbar"><div class="nfill" id="h-nit" style="width:100%"></div></div><span class="hd"> [N] &nbsp; VIEW [P]</span></div>
</div>
<div id="finish"><div class="fb"><h1>RACE COMPLETE</h1><p id="fin-sub"></p><ul class="fl" id="fin-l"></ul><button class="btn btn-red" style="max-width:250px;margin:16px auto;display:block" onclick="backToMenu()">Back</button></div></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database(),RT='zm_racing2';

const CARS=[
  {id:'zm_bolt',name:'ZM Bolt',color:'#e8293a',accent:'#ff6070',top:320,acc:1.8,hnd:.85},
  {id:'zm_phantom',name:'ZM Phantom',color:'#2090f0',accent:'#60b0ff',top:340,acc:1.5,hnd:.9},
  {id:'zm_viper',name:'ZM Viper',color:'#20c060',accent:'#60f090',top:360,acc:1.3,hnd:.75},
  {id:'zm_fury',name:'ZM Fury',color:'#f07020',accent:'#ffa060',top:300,acc:2.2,hnd:.8},
  {id:'zm_spectre',name:'ZM Spectre',color:'#9040e0',accent:'#b070ff',top:350,acc:1.4,hnd:.95},
  {id:'zm_thunder',name:'ZM Thunder',color:'#f0c020',accent:'#ffe060',top:380,acc:1.1,hnd:.7},
];

// ═══ TRACK - pseudo-3D segments ═══
const SEG_LEN=200,ROAD_W=2000,RUMBLE_W=250;
const TRACK_SEGS=600,LAPS=3;
let segments=[];

function buildTrack(){
  segments=[];
  for(let i=0;i<TRACK_SEGS;i++){
    let curve=0,hill=0;
    // Curves
    if(i>20&&i<60) curve=0.5;
    if(i>80&&i<110) curve=-0.8;
    if(i>130&&i<170) curve=1.0;
    if(i>190&&i<220) curve=-0.4;
    if(i>250&&i<300) curve=0.7;
    if(i>320&&i<350) curve=-1.2;
    if(i>380&&i<420) curve=0.3;
    if(i>440&&i<480) curve=-0.6;
    if(i>500&&i<540) curve=0.9;
    if(i>560&&i<590) curve=-0.5;
    // Hills
    if(i>40&&i<70) hill=30;
    if(i>100&&i<120) hill=-20;
    if(i>160&&i<200) hill=40;
    if(i>260&&i<290) hill=-30;
    if(i>340&&i<370) hill=25;
    if(i>450&&i<490) hill=-35;
    if(i>520&&i<550) hill=20;
    
    segments.push({
      index:i,
      curve:curve,
      y:hill,
      p:{world:{x:0,y:0,z:i*SEG_LEN,w:ROAD_W},screen:{x:0,y:0,w:0},scale:0},
      sprites:[],
      color:null
    });
  }
  // Scenery
  for(let i=0;i<TRACK_SEGS;i++){
    if(Math.random()<0.3){
      const side=Math.random()>.5?1:-1;
      const dist=ROAD_W+200+Math.random()*800;
      const type=Math.random();
      let sprite;
      if(type<0.25) sprite={type:'tree',x:side*dist,w:120,h:200,color:'#1a5a2a'};
      else if(type<0.45) sprite={type:'building',x:side*dist,w:200+Math.random()*300,h:300+Math.random()*500,color:'#2a2a3a'};
      else if(type<0.6) sprite={type:'sign',x:side*dist,w:80,h:100,color:'#f0c020'};
      else if(type<0.75) sprite={type:'lamp',x:side*dist,w:20,h:250,color:'#888'};
      else sprite={type:'barrier',x:side*(ROAD_W+50),w:40,h:60,color:'#cc3333'};
      segments[i].sprites.push(sprite);
    }
  }
}

let canvas,ctx,W,H;
let myId=null,myName='',roomId=null,roomRef=null,isHost=false;
let myCar=null,myCarIdx=0,perspective='behind';
let gameOn=false,players={};
let keys={},lastT=0;
let position=0,speed=0,playerX=0;
let nitro=100,nitroOn=false,nitroCool=0;
let lap=1,finished=false,finishTime=0;
let shakeX=0,shakeY=0;

function genCode(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let r='';for(let i=0;i<5;i++)r+=c[~~(Math.random()*c.length)];return r}
function genId(){return'r_'+Date.now()+'_'+Math.random().toString(36).substr(2,6)}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

// ═══ ROOM ═══
async function createRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  myId=genId();roomId=genCode();roomRef=db.ref(RT+'/'+roomId);isHost=true;
  await roomRef.set({code:roomId,host:myId,status:'lobby',players:{[myId]:{name:myName,ready:false,car:null}}});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}
async function joinRoom(){
  myName=document.getElementById('my-name').value.trim()||'Driver';
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  if(!code){alert('Enter code');return;}
  roomRef=db.ref(RT+'/'+code);const snap=await roomRef.once('value');
  if(!snap.exists()){alert('Not found');return;}
  const d=snap.val();if(d.status==='racing'){alert('Already racing');return;}
  myId=genId();roomId=code;isHost=false;
  await roomRef.child('players/'+myId).set({name:myName,ready:false,car:null});
  roomRef.child('players/'+myId).onDisconnect().remove();
  document.getElementById('lb-code').textContent=roomId;
  setupLobby();showScreen('lobby');
}
function setupLobby(){
  roomRef.child('players').on('value',snap=>{
    const pl=snap.val()||{},list=document.getElementById('lb-pl');list.innerHTML='';let i=0;
    const colors=['#e8293a','#2090f0','#20c060','#f07020','#9040e0','#f0c020','#20d0d0','#e0e0e0'];
    Object.entries(pl).forEach(([id,p])=>{const li=document.createElement('li');li.innerHTML=`<span class="pdot" style="background:${colors[i%8]}"></span>${p.name}${id===myId?' (You)':''}`;list.appendChild(li);i++;});
    const n=Object.keys(pl).length;
    document.getElementById('lb-go').style.display=(isHost&&n>=1)?'block':'none';
    document.getElementById('lb-st').textContent=n+' driver'+(n>1?'s':'');
  });
  roomRef.child('status').on('value',snap=>{
    if(snap.val()==='carselect')showCarSelect();
    if(snap.val()==='racing')startRace();
  });
}
function hostStart(){roomRef.child('status').set('carselect');}

function showCarSelect(){
  showScreen('carsel');const grid=document.getElementById('cg');grid.innerHTML='';
  CARS.forEach((car,i)=>{
    const d=document.createElement('div');d.className='car-opt'+(i===0?' sel':'');
    // Draw mini car preview
    d.innerHTML=`<canvas width="80" height="50" id="cp${i}"></canvas><div class="cn">${car.name}</div><div class="cs">SPD ${car.top} ACC ${car.acc} HND ${(car.hnd*100)|0}%</div>`;
    d.onclick=()=>{grid.querySelectorAll('.car-opt').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');myCarIdx=i;};
    grid.appendChild(d);
    // Draw preview after DOM update
    setTimeout(()=>{
      const pc=document.getElementById('cp'+i);if(!pc)return;
      const px=pc.getContext('2d');
      drawCarPreview(px,40,40,car,1);
    },50);
  });
}
function drawCarPreview(cx,x,y,car,s){
  cx.save();cx.translate(x,y);cx.scale(s,s);
  // Body
  cx.fillStyle=car.color;
  cx.beginPath();cx.moveTo(-12,16);cx.lineTo(-10,-16);cx.quadraticCurveTo(0,-22,10,-16);cx.lineTo(12,16);cx.quadraticCurveTo(0,20,-12,16);cx.fill();
  // Windshield
  cx.fillStyle='rgba(100,180,255,0.3)';
  cx.beginPath();cx.moveTo(-7,-10);cx.lineTo(-5,-2);cx.lineTo(5,-2);cx.lineTo(7,-10);cx.quadraticCurveTo(0,-13,-7,-10);cx.fill();
  // Wheels
  cx.fillStyle='#222';
  cx.fillRect(-14,-10,4,8);cx.fillRect(10,-10,4,8);cx.fillRect(-14,6,4,8);cx.fillRect(10,6,4,8);
  // Stripe
  cx.fillStyle=car.accent;cx.fillRect(-2,-18,4,34);cx.globalAlpha=0.3;cx.fillRect(-2,-18,4,34);cx.globalAlpha=1;
  cx.restore();
}
async function confirmCar(){
  myCar=CARS[myCarIdx];
  await roomRef.child('players/'+myId).update({car:myCarIdx,ready:true});
  document.getElementById('cs-st').textContent='Locked in! Waiting...';
  if(isHost){
    roomRef.child('players').on('value',async snap=>{
      const pl=snap.val()||{};
      if(Object.values(pl).every(p=>p.ready&&p.car!==null))
        await roomRef.child('status').set('racing');
    });
  }
}

// ═══ RACE ═══
function startRace(){
  myCar=CARS[myCarIdx]||CARS[0];
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('hud').style.display='flex';
  document.getElementById('finish').style.display='none';
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;
  window.onresize=()=>{W=innerWidth;H=innerHeight;canvas.width=W;canvas.height=H;};
  
  buildTrack();
  position=0;speed=0;playerX=0;nitro=100;nitroOn=false;nitroCool=0;
  lap=1;finished=false;finishTime=0;perspective='behind';
  gameOn=true;
  
  roomRef.child('race').on('value',snap=>{players=snap.val()||{};});
  lastT=performance.now();
  requestAnimationFrame(loop);
  setInterval(syncPos,80);
}
function syncPos(){
  if(!gameOn)return;
  roomRef.child('race/'+myId).set({x:playerX|0,pos:position|0,spd:speed|0,car:myCarIdx,name:myName,lap,finished,ft:finishTime||0,t:Date.now()});
}

// ═══ LOOP ═══
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(gameOn){update(dt);render();}
  requestAnimationFrame(loop);
}

function update(dt){
  if(finished)return;
  const car=myCar||CARS[0];
  const maxSpd=car.top*(nitroOn?1.4:1);
  const acc=car.acc*120;
  const hnd=car.hnd;
  
  // Accel/brake
  if(keys['w']||keys['arrowup'])speed=Math.min(maxSpd,speed+acc*dt);
  else if(keys['s']||keys['arrowdown'])speed=Math.max(-60,speed-acc*2.5*dt);
  else{speed*=.985;if(Math.abs(speed)<2)speed=0;}
  
  // Get current segment curve
  const segIdx=Math.floor(position/SEG_LEN)%TRACK_SEGS;
  const seg=segments[segIdx];
  const curveForce=seg?seg.curve*speed*0.003:0;
  
  // Steering
  const steer=2800*hnd*dt*(speed/300);
  if(keys['a']||keys['arrowleft'])playerX-=steer;
  if(keys['d']||keys['arrowright'])playerX+=steer;
  
  // Centrifugal force from curves
  playerX+=curveForce*dt*60;
  
  // Clamp
  if(playerX<-ROAD_W)playerX=-ROAD_W;
  if(playerX>ROAD_W)playerX=ROAD_W;
  // Off road = slow down
  if(Math.abs(playerX)>ROAD_W*0.48)speed*=0.97;
  
  // Move
  position+=speed*dt*3;
  
  // Nitro
  if(keys['n']&&nitro>0&&nitroCool<=0){
    nitroOn=true;nitro-=35*dt;
    if(nitro<=0){nitro=0;nitroOn=false;nitroCool=2;}
  } else {
    nitroOn=false;
    if(nitroCool>0)nitroCool-=dt;
    if(!keys['n']&&nitroCool<=0)nitro=Math.min(100,nitro+10*dt);
  }
  
  // Camera shake at high speed
  const spdRatio=speed/car.top;
  shakeX=(Math.random()-.5)*spdRatio*3;
  shakeY=(Math.random()-.5)*spdRatio*2;
  if(nitroOn){shakeX*=3;shakeY*=3;}
  
  // Laps
  const totalLen=TRACK_SEGS*SEG_LEN;
  const currentLap=Math.floor(position/totalLen)+1;
  if(currentLap>LAPS&&!finished){
    finished=true;finishTime=Date.now();syncPos();
    setTimeout(showFinish,1500);
  }
  lap=Math.min(LAPS,currentLap);
}

// ═══ RENDER (pseudo-3D road) ═══
function render(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  ctx.save();
  ctx.translate(shakeX,shakeY);
  
  const camH=1200+speed*0.5;
  const camD=perspective==='behind'?0.84:0.6;
  const drawDist=perspective==='behind'?200:150;
  const fov=120;
  
  const baseSegIdx=Math.floor(position/SEG_LEN);
  const basePercent=(position%SEG_LEN)/SEG_LEN;
  
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,H/2);
  skyGrad.addColorStop(0,'#0a0a1a');
  skyGrad.addColorStop(0.4,'#101028');
  skyGrad.addColorStop(0.7,'#1a1030');
  skyGrad.addColorStop(1,'#201828');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H/2+20);
  
  // Stars
  if(speed<200){
    ctx.fillStyle='#fff';
    for(let i=0;i<30;i++){
      const sx=(Math.sin(i*127.1+position*0.0001)*0.5+0.5)*W;
      const sy=(Math.cos(i*311.7)*0.3+0.1)*H;
      ctx.globalAlpha=0.3+Math.sin(i*73+lastT*0.001)*0.3;
      ctx.fillRect(sx,sy,1.5,1.5);
    }
    ctx.globalAlpha=1;
  }
  
  // Mountains silhouette
  ctx.fillStyle='#0f0f1a';
  ctx.beginPath();ctx.moveTo(0,H/2+10);
  for(let mx=0;mx<=W;mx+=20){
    const mh=Math.sin(mx*0.003+position*0.00005)*40+Math.sin(mx*0.008)*20;
    ctx.lineTo(mx,H/2-30-mh);
  }
  ctx.lineTo(W,H/2+10);ctx.fill();
  
  // City skyline
  ctx.fillStyle='#121220';
  for(let bx=0;bx<W;bx+=40+Math.sin(bx*0.1)*20){
    const bh=60+Math.sin(bx*0.07+position*0.0001)*40+Math.sin(bx*0.17)*30;
    ctx.fillRect(bx,H/2-bh+10,25,bh);
    // Windows
    ctx.fillStyle='rgba(240,200,80,0.15)';
    for(let wy=H/2-bh+20;wy<H/2;wy+=12){
      for(let wx=bx+4;wx<bx+22;wx+=8){
        if(Math.random()>.4)ctx.fillRect(wx,wy,4,6);
      }
    }
    ctx.fillStyle='#121220';
  }
  
  // Road rendering
  let maxY=H;
  let x=0,dx=0;
  let cumY=0;
  
  for(let n=0;n<drawDist;n++){
    const idx=(baseSegIdx+n)%TRACK_SEGS;
    const seg=segments[idx];
    const looped=Math.floor((baseSegIdx+n)/TRACK_SEGS);
    
    // Project
    const camZ=position-(basePercent*SEG_LEN);
    const z=(idx*SEG_LEN+looped*TRACK_SEGS*SEG_LEN)-camZ;
    if(z<=0)continue;
    
    const scale=fov/z;
    const projX=W/2+((x-playerX*scale)*W/2);
    const projY=H*camD-((camH+cumY)*scale*H);
    const projW=ROAD_W*scale*W/2;
    
    seg.p.screen={x:projX,y:projY,w:projW};
    seg.p.scale=scale;
    
    // Accumulate curve and hill
    dx+=seg.curve;
    x+=dx;
    cumY+=seg.y;
    
    // Colors
    const dark=Math.floor(idx/3)%2===0;
    seg.color={
      road:dark?'#333333':'#303030',
      rumble:dark?'#cc0000':'#fff',
      grass:dark?'#0a3a0a':'#0c440c',
      lane:dark?'#fff':'#333333',
    };
  }
  
  // Draw back to front
  for(let n=drawDist-1;n>0;n--){
    const idx=(baseSegIdx+n)%TRACK_SEGS;
    const idx2=(baseSegIdx+n-1)%TRACK_SEGS;
    const s1=segments[idx],s2=segments[idx2];
    const p1=s1.p.screen,p2=s2.p.screen;
    if(!s1.color||p1.y>=maxY)continue;
    
    // Grass
    ctx.fillStyle=s1.color.grass;
    ctx.fillRect(0,p1.y,W,p2.y-p1.y+1);
    
    // Rumble strips
    const rw1=p1.w*1.15,rw2=p2.w*1.15;
    ctx.fillStyle=s1.color.rumble;
    drawPoly(ctx,p1.x-rw1,p1.y,p1.x-p1.w,p1.y,p2.x-p2.w,p2.y,p2.x-rw2,p2.y);
    drawPoly(ctx,p1.x+p1.w,p1.y,p1.x+rw1,p1.y,p2.x+rw2,p2.y,p2.x+p2.w,p2.y);
    
    // Road
    ctx.fillStyle=s1.color.road;
    drawPoly(ctx,p1.x-p1.w,p1.y,p1.x+p1.w,p1.y,p2.x+p2.w,p2.y,p2.x-p2.w,p2.y);
    
    // Lane markings
    if(s1.color.lane==='#fff'){
      const lw=p1.w*0.02;
      for(let l=-2;l<=2;l++){
        if(l===0)continue;
        const lx1=p1.x+p1.w*l*0.33,lx2=p2.x+p2.w*l*0.33;
        ctx.fillStyle='rgba(255,255,255,0.6)';
        drawPoly(ctx,lx1-lw,p1.y,lx1+lw,p1.y,lx2+lw,p2.y,lx2-lw,p2.y);
      }
    }
    
    // Center line
    const clw=p1.w*0.01;
    ctx.fillStyle='rgba(255,255,0,0.4)';
    drawPoly(ctx,p1.x-clw,p1.y,p1.x+clw,p1.y,p2.x+clw,p2.y,p2.x-clw,p2.y);
    
    // Sprites (scenery)
    for(const sp of s1.sprites){
      const sprScale=s1.p.scale;
      const sx=p1.x+(sp.x*sprScale*W/2);
      const sw=sp.w*sprScale*W/2;
      const sh=sp.h*sprScale*W/2;
      if(sp.type==='tree'){
        ctx.fillStyle='#3a2010';ctx.fillRect(sx-sw*0.1,p1.y-sh*0.3,sw*0.2,sh*0.4);
        ctx.fillStyle=sp.color;ctx.beginPath();ctx.arc(sx,p1.y-sh*0.5,sw*0.5,0,Math.PI*2);ctx.fill();
      } else if(sp.type==='building'){
        ctx.fillStyle=sp.color;ctx.fillRect(sx-sw/2,p1.y-sh,sw,sh);
        ctx.fillStyle='rgba(240,200,80,0.08)';
        for(let wy=p1.y-sh+sh*0.1;wy<p1.y;wy+=sh*0.12){
          for(let wx=sx-sw/2+sw*0.1;wx<sx+sw/2;wx+=sw*0.15){
            if(Math.random()>.5)ctx.fillRect(wx,wy,sw*0.08,sh*0.06);
          }
        }
      } else if(sp.type==='lamp'){
        ctx.fillStyle=sp.color;ctx.fillRect(sx-1,p1.y-sh,3*sprScale*500,sh);
        ctx.fillStyle='rgba(255,240,180,0.15)';ctx.beginPath();ctx.arc(sx,p1.y-sh,sw*3,0,Math.PI*2);ctx.fill();
      } else if(sp.type==='barrier'){
        ctx.fillStyle=sp.color;ctx.fillRect(sx-sw/2,p1.y-sh,sw,sh);
        ctx.fillStyle='#fff';ctx.fillRect(sx-sw/2,p1.y-sh*0.6,sw,sh*0.15);
      } else if(sp.type==='sign'){
        ctx.fillStyle='#555';ctx.fillRect(sx-2,p1.y-sh,4,sh);
        ctx.fillStyle=sp.color;ctx.fillRect(sx-sw/2,p1.y-sh,sw,sw*0.6);
      }
    }
    
    // Finish line
    const lapLen=TRACK_SEGS*SEG_LEN;
    for(let l=1;l<=LAPS;l++){
      const fSeg=Math.floor((l*lapLen)/(SEG_LEN))%TRACK_SEGS;
      if(idx===fSeg){
        ctx.fillStyle='rgba(255,255,255,0.8)';
        drawPoly(ctx,p1.x-p1.w,p1.y,p1.x+p1.w,p1.y,p2.x+p2.w,p2.y,p2.x-p2.w,p2.y);
        // Checkerboard
        const cw=p1.w/8;
        for(let ci=0;ci<16;ci++){
          if(ci%2===(Math.floor(idx/2)%2))continue;
          ctx.fillStyle='#000';
          const cx1=p1.x-p1.w+ci*cw;
          ctx.fillRect(cx1,p1.y,cw,(p2.y-p1.y));
        }
      }
    }
    
    maxY=p1.y;
  }
  
  // Other players
  const now=Date.now();
  Object.entries(players).forEach(([id,p])=>{
    if(id===myId||!p||now-p.t>5000)return;
    const relPos=p.pos-position;
    if(relPos<0||relPos>drawDist*SEG_LEN)return;
    const segN=Math.floor(relPos/SEG_LEN);
    if(segN<=0||segN>=drawDist)return;
    const sIdx=(baseSegIdx+segN)%TRACK_SEGS;
    const s=segments[sIdx];
    if(!s||!s.p.screen)return;
    const sc=s.p.scale;
    const sx=s.p.screen.x+((p.x-playerX)*sc*W/2);
    const sy=s.p.screen.y;
    const car=CARS[p.car||0];
    const cw=50*sc*W,ch=80*sc*W;
    if(cw<2)return;
    ctx.fillStyle=car.color;
    ctx.fillRect(sx-cw/2,sy-ch,cw,ch);
    ctx.fillStyle=car.accent;ctx.fillRect(sx-cw*0.05,sy-ch,cw*0.1,ch);
    ctx.fillStyle='#fff';ctx.font=`bold ${Math.max(8,cw*0.3)|0}px Orbitron`;ctx.textAlign='center';
    ctx.fillText(p.name||'',sx,sy-ch-4);
  });
  
  // My car
  drawPlayerCar();
  
  // Speed lines
  if(speed>200){
    const alpha=Math.min(.5,(speed-200)/300);
    ctx.strokeStyle=`rgba(255,255,220,${alpha})`;ctx.lineWidth=1;
    for(let i=0;i<12;i++){
      const lx=W/2+(Math.random()-.5)*W*0.8;
      const ly=H*0.3+Math.random()*H*0.5;
      const len=20+speed*0.15;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(lx-W/2)*0.02,ly+len);ctx.stroke();
    }
  }
  
  // Vignette
  const vig=ctx.createRadialGradient(W/2,H/2,W*0.3,W/2,H/2,W*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  
  // Nitro screen effect
  if(nitroOn){
    ctx.fillStyle='rgba(255,150,0,0.04)';ctx.fillRect(0,0,W,H);
    // Edge glow
    const ng=ctx.createRadialGradient(W/2,H,W*0.2,W/2,H,W*0.7);
    ng.addColorStop(0,'rgba(255,100,0,0.1)');ng.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ng;ctx.fillRect(0,0,W,H);
  }
  
  ctx.restore();
}

function drawPlayerCar(){
  const cx=W/2,cy=H*0.82;
  const car=myCar||CARS[0];
  const s=1.5;
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  
  // Tilt based on steering
  const tilt=((keys['a']||keys['arrowleft'])?0.08:0)+((keys['d']||keys['arrowright'])?-0.08:0);
  ctx.rotate(tilt);
  
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.ellipse(0,22,18,5,0,0,Math.PI*2);ctx.fill();
  
  // Body
  ctx.fillStyle=car.color;
  ctx.beginPath();ctx.moveTo(-15,20);ctx.lineTo(-13,-20);ctx.quadraticCurveTo(0,-28,13,-20);ctx.lineTo(15,20);ctx.quadraticCurveTo(0,24,-15,20);ctx.fill();
  
  // Roof / cockpit
  ctx.fillStyle='rgba(50,100,160,0.3)';
  ctx.beginPath();ctx.moveTo(-9,-12);ctx.lineTo(-7,-2);ctx.lineTo(7,-2);ctx.lineTo(9,-12);ctx.quadraticCurveTo(0,-15,-9,-12);ctx.fill();
  
  // Stripe
  ctx.fillStyle=car.accent;ctx.globalAlpha=0.5;ctx.fillRect(-2,-25,4,45);ctx.globalAlpha=1;
  
  // Headlights
  ctx.fillStyle='rgba(255,255,200,0.8)';ctx.beginPath();ctx.arc(-8,-18,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,-18,3,0,Math.PI*2);ctx.fill();
  
  // Taillights
  ctx.fillStyle='#ff2020';ctx.fillRect(-12,16,5,3);ctx.fillRect(7,16,5,3);
  
  // Wheels
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(-17,-14,5,10);ctx.fillRect(12,-14,5,10);
  ctx.fillRect(-17,8,5,10);ctx.fillRect(12,8,5,10);
  // Wheel shine
  ctx.fillStyle='rgba(255,255,255,0.1)';
  ctx.fillRect(-16,-12,3,3);ctx.fillRect(13,-12,3,3);
  
  // Nitro flame
  if(nitroOn){
    ctx.globalAlpha=0.6+Math.random()*0.4;
    const fh=15+Math.random()*15;
    const grad=ctx.createLinearGradient(0,20,0,20+fh);
    grad.addColorStop(0,'#fff');grad.addColorStop(0.3,'#f0c020');grad.addColorStop(0.7,'#f07020');grad.addColorStop(1,'rgba(255,50,0,0)');
    ctx.fillStyle=grad;
    ctx.beginPath();ctx.moveTo(-7,20);ctx.lineTo(0,20+fh);ctx.lineTo(7,20);ctx.fill();
    ctx.globalAlpha=1;
  }
  
  ctx.restore();
}

function drawPoly(c,x1,y1,x2,y2,x3,y3,x4,y4){
  c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x3,y3);c.lineTo(x4,y4);c.fill();
}

function updateHUD(){
  document.getElementById('h-spd').textContent=Math.floor(Math.abs(speed));
  document.getElementById('h-lap').textContent=lap+'/'+LAPS;
  document.getElementById('h-nit').style.width=nitro+'%';
  const all=Object.entries(players).sort((a,b)=>(b[1].pos||0)-(a[1].pos||0));
  const pos=all.findIndex(([id])=>id===myId)+1;
  document.getElementById('h-pos').textContent=pos>0?'#'+pos:'-';
}

// Override loop to include HUD
const _origLoop=loop;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;
  if(gameOn){update(dt);render();updateHUD();}
  requestAnimationFrame(loop);
}

async function showFinish(){
  const snap=await roomRef.child('race').once('value');
  const rd=snap.val()||{};
  const results=Object.entries(rd).filter(([,p])=>p.finished).sort((a,b)=>a[1].ft-b[1].ft);
  const list=document.getElementById('fin-l');list.innerHTML='';
  results.forEach(([id,p],i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="fp">#${i+1}</span><span>${p.name} — ${CARS[p.car||0].name}</span>`;
    if(id===myId)li.style.borderColor='var(--yellow)';
    list.appendChild(li);
  });
  Object.entries(rd).filter(([,p])=>!p.finished).forEach(([id,p])=>{
    const li=document.createElement('li');li.innerHTML=`<span class="fp">DNF</span><span style="color:var(--dim)">${p.name}</span>`;
    list.appendChild(li);
  });
  document.getElementById('finish').style.display='flex';
}

function backToMenu(){gameOn=false;document.getElementById('hud').style.display='none';document.getElementById('finish').style.display='none';showScreen('menu');}

// ═══ INPUT ═══
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  const k=e.key.toLowerCase();keys[k]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright'].includes(k))e.preventDefault();
  if(k==='p'&&gameOn)perspective=perspective==='behind'?'top':'behind';
});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
window.addEventListener('blur',()=>{for(const k in keys)keys[k]=false;});
document.getElementById('join-code').addEventListener('keydown',e=>{if(e.key==='Enter')joinRoom();});
</script>
